<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meteor-1A</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--border:rgba(255,255,255,0.07);
  --text:#e8e8e8;--muted:rgba(255,255,255,0.35);--accent:#fff;
  --input-bg:rgba(255,255,255,0.04);
  --lua-kw:#c792ea;--lua-fn:#82aaff;--lua-str:#c3e88d;
  --lua-num:#f78c6c;--lua-comment:rgba(255,255,255,0.28);
  --lua-op:rgba(255,255,255,0.55);--lua-builtin:#ffcb6b;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center}
.noise{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
.wrap{position:relative;z-index:1;width:100%;max-width:740px;height:100vh;display:flex;flex-direction:column;padding:0 1rem}
header{display:flex;align-items:center;gap:.75rem;padding:1.4rem 0 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{width:26px;height:26px;opacity:.9}
.header-sub{margin-left:auto;font-size:.65rem;color:var(--muted);letter-spacing:.08em}

.model-select-wrap{position:relative;display:flex;align-items:center}
.model-select-wrap::after{content:'⌄';position:absolute;right:.5rem;top:50%;transform:translateY(-52%);font-size:.7rem;color:var(--muted);pointer-events:none;line-height:1}
.model-select{
  font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;
  letter-spacing:.12em;color:var(--accent);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;padding:.25rem 1.6rem .25rem .6rem;
  cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;
  text-transform:uppercase;transition:border-color .2s,background .2s
}
.model-select:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2)}
.model-select:focus{border-color:rgba(255,255,255,0.25)}
.model-select option{background:#111;color:var(--text);font-family:'Syne',sans-serif;letter-spacing:.08em}

.messages{flex:1;overflow-y:auto;padding:1.5rem 0;display:flex;flex-direction:column;gap:1.5rem;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;opacity:.35;pointer-events:none}
.empty-icon{width:48px;opacity:.5}
.empty-label{font-family:'Syne',sans-serif;font-size:.75rem;letter-spacing:.2em;color:var(--muted)}

.msg{display:flex;flex-direction:row;gap:.75rem;align-items:flex-start;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:2px}
.msg-avatar.ai-avatar{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1)}
.msg-avatar.ai-avatar img{width:16px;height:16px;opacity:.8}
.msg-avatar.user-avatar{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12)}
.msg-avatar.user-avatar svg{width:14px;height:14px;fill:rgba(255,255,255,0.5)}

.msg-content{display:flex;flex-direction:column;gap:.35rem;flex:1;min-width:0}
.msg-role{font-size:.6rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.msg-role.ai{color:rgba(255,255,255,0.5)}
.msg-body{font-size:.85rem;line-height:1.75;color:var(--text);word-break:break-word}
.msg-body.user{color:rgba(255,255,255,0.6);font-size:.8rem;white-space:pre-wrap}

.msg-body p{margin:.25rem 0}
.msg-body p:first-child{margin-top:0}
.msg-body p:last-child{margin-bottom:0}
.msg-body strong{color:#fff;font-weight:600}
.msg-body em{font-style:italic;color:rgba(255,255,255,0.75)}
.msg-body h1,.msg-body h2,.msg-body h3,.msg-body h4{font-family:'Syne',sans-serif;font-weight:700;color:#fff;margin:.75rem 0 .3rem;line-height:1.3}
.msg-body h1{font-size:1.1rem}
.msg-body h2{font-size:.95rem;letter-spacing:.04em}
.msg-body h3{font-size:.85rem;letter-spacing:.04em}
.msg-body h4{font-size:.8rem;letter-spacing:.04em}
.msg-body ul,.msg-body ol{padding-left:1.25rem;margin:.3rem 0}
.msg-body li{margin:.15rem 0;line-height:1.65}
.msg-body hr{border:none;border-top:1px solid var(--border);margin:.75rem 0}
.msg-body a{color:rgba(255,255,255,0.75);text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(255,255,255,0.25);transition:color .2s}
.msg-body a:hover{color:#fff;text-decoration-color:rgba(255,255,255,0.6)}
.msg-body code.inline-code{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:.1em .35em;font-family:'JetBrains Mono',monospace;font-size:.8em;color:#c3e88d}
.msg-body .tag-highlight{background:#fff;color:#000;border-radius:3px;padding:.05em .3em;font-size:.82em;font-family:'JetBrains Mono',monospace;font-weight:500}

.thinking-block{margin-bottom:.6rem;border-left:2px solid rgba(255,255,255,0.1);padding-left:.75rem}
.thinking-toggle{font-size:.6rem;letter-spacing:.12em;cursor:pointer;text-transform:uppercase;display:flex;align-items:center;gap:.4rem;background:none;border:none;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:0;margin-bottom:.3rem}
.thinking-toggle:hover{color:rgba(255,255,255,0.5)}
.thinking-content{font-size:.7rem;line-height:1.7;color:rgba(255,255,255,0.2);display:none;white-space:pre-wrap;word-break:break-word}
.thinking-content.open{display:block}

.code-block{margin:.4rem 0;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);background:#0d0d0d;display:block}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:.4rem .75rem;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.06)}
.code-lang{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.code-file-name{font-size:.6rem;color:rgba(255,255,255,0.3);margin-left:.5rem}
.copy-btn{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px solid rgba(255,255,255,0.1);color:var(--muted);padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s}
.copy-btn:hover{background:rgba(255,255,255,0.07);color:var(--text);border-color:rgba(255,255,255,0.2)}
.copy-btn.copied{color:#c3e88d;border-color:#c3e88d44}
.code-body{padding:.85rem 1rem;overflow-x:auto;font-size:.78rem;line-height:1.7;white-space:pre;font-family:'JetBrains Mono',monospace}
.code-body::-webkit-scrollbar{height:4px}
.code-body::-webkit-scrollbar-track{background:transparent}
.code-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}

.lkw{color:var(--lua-kw)}.lfn{color:var(--lua-fn)}.lstr{color:var(--lua-str)}
.lnum{color:var(--lua-num)}.lcmt{color:var(--lua-comment);font-style:italic}
.lop{color:var(--lua-op)}.lbi{color:var(--lua-builtin)}

/* Word reveal animation */
.word{display:inline;animation:wordReveal .3s ease forwards}
@keyframes wordReveal{from{opacity:0;filter:blur(3px)}to{opacity:1;filter:blur(0)}}

.cursor-blink{display:inline-block;width:2px;height:.85em;background:rgba(255,255,255,0.6);vertical-align:middle;margin-left:2px;animation:blink .9s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.input-area{flex-shrink:0;border-top:1px solid var(--border);padding:.75rem 0 1.25rem;display:flex;flex-direction:column;gap:.5rem}

.attachments-bar{display:flex;flex-wrap:wrap;gap:.4rem}
.attach-chip{display:flex;align-items:center;gap:.35rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:.2rem .5rem;font-size:.65rem;color:rgba(255,255,255,0.55);max-width:200px}
.attach-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-chip-remove{background:none;border:none;color:var(--muted);cursor:pointer;padding:0;line-height:1;font-size:.75rem;flex-shrink:0}
.attach-chip-remove:hover{color:var(--text)}

.input-row{display:flex;gap:.75rem;align-items:flex-end}

.drop-zone{position:relative}
.drop-zone.drag-over textarea{border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.07)}
.drop-hint{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:.7rem;letter-spacing:.1em;color:rgba(255,255,255,0.4);pointer-events:none;border-radius:8px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.2)}
.drop-zone.drag-over .drop-hint{display:flex}

textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:.7rem .85rem;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.6;resize:none;outline:none;max-height:140px;transition:border-color .2s,background .2s}
textarea::placeholder{color:var(--muted)}
textarea:focus{border-color:rgba(255,255,255,0.18)}

.btns{display:flex;gap:.5rem;flex-shrink:0;align-items:flex-end}
.send-btn{background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,border-color .2s;flex-shrink:0}
.send-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.send-btn svg{width:16px;height:16px;fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.attach-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,border-color .2s;flex-shrink:0;color:var(--muted)}
.attach-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:var(--text)}
.attach-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.spinner{display:inline-block;width:14px;height:14px;border:1.5px solid rgba(255,255,255,0.1);border-top-color:rgba(255,255,255,0.5);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="noise"></div>
<div class="wrap">
  <header>
    <img class="logo" src="assets/comet_2.png" alt="Comet" />
    <div class="model-select-wrap">
      <select id="modelSelect" class="model-select">
        <option value="1A">Meteor-1A</option>
      </select>
    </div>
    <span class="header-sub">by comet</span>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <img class="empty-icon" src="assets/comet_2.png" alt="" />
      <span class="empty-label">Ask Meteor anything</span>
    </div>
  </div>

  <div class="input-area">
    <div class="attachments-bar" id="attachBar"></div>
    <div class="input-row">
      <div class="drop-zone" id="dropZone" style="flex:1">
        <textarea id="input" rows="1" placeholder="message meteor... or drop .lua files"></textarea>
        <div class="drop-hint">drop lua files here</div>
      </div>
      <div class="btns">
        <button class="attach-btn" id="attachBtn" title="attach lua file">
          <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".lua,.luau,.txt" multiple style="display:none" />

<script>
const inputEl = document.getElementById('input');
const messages = document.getElementById('messages');
const sendBtn = document.getElementById('sendBtn');
const attachBtn = document.getElementById('attachBtn');
const fileInput = document.getElementById('fileInput');
const attachBar = document.getElementById('attachBar');
const dropZone = document.getElementById('dropZone');
let emptyState = document.getElementById('emptyState');

let attachedFiles = [];

const LUA_KW = new Set(['and','break','do','else','elseif','end','false','for','function','goto','if','in','local','nil','not','or','repeat','return','then','true','until','while']);
const LUA_BI = new Set(['print','pairs','ipairs','tostring','tonumber','type','error','assert','pcall','xpcall','select','unpack','rawget','rawset','rawequal','rawlen','require','load','loadfile','loadstring','dofile','collectgarbage','getmetatable','setmetatable','next','task','game','workspace','script','Instance','Vector3','Vector2','CFrame','Color3','UDim','UDim2','TweenInfo','Enum','wait','spawn','delay','math','table','string','os','coroutine','bit32','getfenv','setfenv','getrawmetatable','setrawmetatable','hookfunction','newcclosure','checkcaller','iscclosure','islclosure','clonefunction','Drawing','writefile','readfile','listfiles','makefolder','delfolder','delfile','HttpGet','request','http','syn','_G','shared']);

function luaHighlight(code) {
  const out = [];
  let i = 0;
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  while (i < code.length) {
    if (code[i] === '-' && code[i+1] === '-') {
      let end = code.indexOf('\n', i);
      if (end === -1) end = code.length;
      out.push(`<span class="lcmt">${esc(code.slice(i,end))}</span>`);
      i = end; continue;
    }
    if (code[i] === '"' || code[i] === "'") {
      const q = code[i]; let j = i+1;
      while (j < code.length && code[j] !== q) { if (code[j] === '\\') j++; j++; }
      out.push(`<span class="lstr">${esc(code.slice(i,j+1))}</span>`);
      i = j+1; continue;
    }
    if (code[i] === '[' && (code[i+1] === '[' || code[i+1] === '=')) {
      let lvl = 0; let k = i+1;
      while (code[k] === '=') { lvl++; k++; }
      if (code[k] === '[') {
        const close = ']' + '='.repeat(lvl) + ']';
        let end = code.indexOf(close, k+1);
        if (end === -1) end = code.length - close.length;
        out.push(`<span class="lstr">${esc(code.slice(i, end+close.length))}</span>`);
        i = end + close.length; continue;
      }
    }
    const nm = code.slice(i).match(/^(0x[\da-fA-F]+|\d+\.?\d*([eE][+-]?\d+)?)/);
    if (nm && (i === 0 || !/\w/.test(code[i-1]))) {
      out.push(`<span class="lnum">${esc(nm[0])}</span>`);
      i += nm[0].length; continue;
    }
    const wm = code.slice(i).match(/^[a-zA-Z_]\w*/);
    if (wm) {
      const w = wm[0];
      if (LUA_KW.has(w)) out.push(`<span class="lkw">${esc(w)}</span>`);
      else if (LUA_BI.has(w)) out.push(`<span class="lbi">${esc(w)}</span>`);
      else {
        const after = code.slice(i+w.length).replace(/^[\s\n]*/,'');
        if (after[0] === '(' || after[0] === '{') out.push(`<span class="lfn">${esc(w)}</span>`);
        else out.push(esc(w));
      }
      i += w.length; continue;
    }
    const om = code.slice(i).match(/^[+\-*\/^%#&|~<>=.,:;(){}[\]]/);
    if (om) { out.push(`<span class="lop">${esc(om[0])}</span>`); i += om[0].length; continue; }
    out.push(esc(code[i])); i++;
  }
  return out.join('');
}

function makeCodeBlock(lang, code, fileName) {
  const wrap = document.createElement('div');
  wrap.className = 'code-block';
  const hdr = document.createElement('div');
  hdr.className = 'code-header';
  const left = document.createElement('div');
  left.style.display = 'flex'; left.style.alignItems = 'center'; left.style.gap = '.4rem';
  const lbl = document.createElement('span');
  lbl.className = 'code-lang';
  lbl.textContent = lang || 'code';
  left.appendChild(lbl);
  if (fileName) {
    const fn = document.createElement('span');
    fn.className = 'code-file-name';
    fn.textContent = fileName;
    left.appendChild(fn);
  }
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.textContent = 'copy';
  btn.onclick = () => {
    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = 'copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
    });
  };
  hdr.appendChild(left); hdr.appendChild(btn);
  const body = document.createElement('div');
  body.className = 'code-body';
  if (/^lua$/i.test(lang)) body.innerHTML = luaHighlight(code);
  else body.textContent = code;
  wrap.appendChild(hdr); wrap.appendChild(body);
  return wrap;
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseSegments(text) {
  const segs = [];
  const re = /```(\w*)\n?([\s\S]*?)```/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) segs.push({type:'text', value: text.slice(last, m.index)});
    segs.push({type:'code', lang: m[1]||'', value: m[2]});
    last = m.index + m[0].length;
  }
  if (last < text.length) segs.push({type:'text', value: text.slice(last)});
  return segs;
}

// ── Inline markdown → HTML string ────────────────────────────────────────────
function inlineMarkdown(text) {
  let result = '';
  let i = 0;
  const patterns = [
    { re: /`([^`]+)`/,           fn: (m) => `<code class="inline-code">${escHtml(m[1])}</code>` },
    { re: /\*\*([^*]+)\*\*/,     fn: (m) => `<strong>${inlineMarkdown(m[1])}</strong>` },
    { re: /\*([^*]+)\*/,         fn: (m) => `<em>${inlineMarkdown(m[1])}</em>` },
    { re: /\[([^\]]+)\]\(([^)]+)\)/, fn: (m) => `<a href="${escHtml(m[2])}" target="_blank" rel="noopener">${escHtml(m[1])}</a>` },
    { re: /<([a-zA-Z][a-zA-Z0-9_\-/ ]*)>/, fn: (m) => `<span class="tag-highlight">${escHtml(m[1])}</span>` },
  ];
  while (i < text.length) {
    let earliest = -1, earliestMatch = null, earliestFn = null;
    for (const p of patterns) {
      const m = p.re.exec(text.slice(i));
      if (m && (earliest === -1 || m.index < earliest)) {
        earliest = m.index; earliestMatch = m; earliestFn = p.fn;
      }
    }
    if (earliest === -1) { result += escHtml(text.slice(i)); break; }
    result += escHtml(text.slice(i, i + earliest));
    result += earliestFn(earliestMatch);
    i += earliest + earliestMatch[0].length;
  }
  return result.replace(/\n/g, '<br>');
}

// ── Full markdown → DOM (rendered immediately, no animation) ─────────────────
function renderMarkdownToContainer(text, container) {
  const segs = parseSegments(text);
  for (const seg of segs) {
    if (seg.type === 'code') {
      container.appendChild(makeCodeBlock(seg.lang, seg.value));
    } else {
      renderTextBlock(seg.value, container);
    }
  }
}

function renderTextBlock(text, container) {
  const lines = text.split('\n');
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.trim() === '') { i++; continue; }
    const hm = line.match(/^(#{1,4})\s+(.+)/);
    if (hm) {
      const el = document.createElement('h' + hm[1].length);
      el.innerHTML = inlineMarkdown(hm[2]);
      container.appendChild(el); i++; continue;
    }
    if (/^[-*_]{3,}$/.test(line.trim())) {
      container.appendChild(document.createElement('hr')); i++; continue;
    }
    if (/^[\-\*\+]\s/.test(line)) {
      const ul = document.createElement('ul');
      while (i < lines.length && /^[\-\*\+]\s/.test(lines[i])) {
        const li = document.createElement('li');
        li.innerHTML = inlineMarkdown(lines[i].replace(/^[\-\*\+]\s/, ''));
        ul.appendChild(li); i++;
      }
      container.appendChild(ul); continue;
    }
    if (/^\d+\.\s/.test(line)) {
      const ol = document.createElement('ol');
      while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
        const li = document.createElement('li');
        li.innerHTML = inlineMarkdown(lines[i].replace(/^\d+\.\s/, ''));
        ol.appendChild(li); i++;
      }
      container.appendChild(ol); continue;
    }
    let paraLines = [];
    while (i < lines.length) {
      const l = lines[i];
      if (l.trim() === '') { i++; break; }
      if (/^#{1,4}\s/.test(l) || /^[\-\*\+]\s/.test(l) || /^\d+\.\s/.test(l) || /^[-*_]{3,}$/.test(l.trim())) break;
      paraLines.push(l); i++;
    }
    if (paraLines.length) {
      const p = document.createElement('p');
      p.innerHTML = inlineMarkdown(paraLines.join('\n'));
      container.appendChild(p);
    }
  }
}

// ── Reveal: word-by-word for text, char-by-char for code ─────────────────────
async function revealContent(text, container) {
  const segs = parseSegments(text);
  for (const seg of segs) {
    if (seg.type === 'code') {
      const cb = makeCodeBlock(seg.lang, '');
      const codeBodyEl = cb.querySelector('.code-body');
      container.appendChild(cb);
      await typeCodeBlock(seg.lang, seg.value, codeBodyEl);
    } else {
      await streamWords(seg.value, container);
    }
    messages.scrollTop = messages.scrollHeight;
  }
}

// Stream plain text as words, respecting markdown block structure.
// Strategy: tokenize the text into words+spaces, appending each word to a
// running buffer, then re-render the whole buffer each time via markdown.
// This is simple, correct, and produces a streaming typewriter feel.
async function streamWords(text, container) {
  // Split text into tokens: words and whitespace/punctuation runs
  const tokens = text.split(/(\s+)/);
  let buffer = '';

  for (let i = 0; i < tokens.length; i++) {
    buffer += tokens[i];
    // Re-render the buffer into the container
    container.innerHTML = '';
    renderTextBlock(buffer, container);
    messages.scrollTop = messages.scrollHeight;

    const isSpace = /^\s+$/.test(tokens[i]);
    if (!isSpace && tokens[i].length > 0) {
      await sleep(18 + Math.random() * 22);
    }
  }
}

async function typeCodeBlock(lang, code, bodyEl) {
  const isLua = /^lua$/i.test(lang);
  let typed = '';
  for (let i = 0; i < code.length; i++) {
    typed += code[i];
    if (isLua) bodyEl.innerHTML = luaHighlight(typed);
    else bodyEl.textContent = typed;
    messages.scrollTop = messages.scrollHeight;
    let delay = 6;
    if (code[i] === '\n') delay = 14;
    else if (code[i] === ' ') delay = 3;
    if (Math.random() < 0.04) delay += 25;
    await sleep(delay);
  }
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

// ── Avatar helpers ────────────────────────────────────────────────────────────
function makeAiAvatar() {
  const av = document.createElement('div');
  av.className = 'msg-avatar ai-avatar';
  const img = document.createElement('img');
  img.src = 'assets/comet_2.png'; img.alt = 'Meteor';
  av.appendChild(img);
  return av;
}

function makeUserAvatar() {
  const av = document.createElement('div');
  av.className = 'msg-avatar user-avatar';
  av.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>`;
  return av;
}

function looksLikeCode(text) {
  const luaPatterns = [
    /\blocal\s+\w+/,/\bfunction\s+\w+/,/\bend\b/,/\bfor\s+\w+\s*=/,
    /\bif\s+.+\bthen\b/,/game[:.]GetService/,/workspace\./,/Instance\.new/,
    /task\.wait/,/pairs\s*\(/,/ipairs\s*\(/,/:FindFirstChild/,/:WaitForChild/,
  ];
  const matches = luaPatterns.filter(p => p.test(text)).length;
  const lines = text.split('\n').length;
  return matches >= 2 || (lines >= 4 && matches >= 1);
}

// ── Message rendering ─────────────────────────────────────────────────────────
function renderUserMessage(promptText, files) {
  const div = document.createElement('div');
  div.className = 'msg';
  div.appendChild(makeUserAvatar());
  const content = document.createElement('div');
  content.className = 'msg-content';
  const roleEl = document.createElement('div');
  roleEl.className = 'msg-role';
  roleEl.textContent = 'you';
  const body = document.createElement('div');
  body.className = 'msg-body user';
  if (promptText) {
    if (looksLikeCode(promptText)) {
      body.appendChild(makeCodeBlock('lua', promptText));
    } else {
      const t = document.createElement('span');
      t.style.whiteSpace = 'pre-wrap';
      t.textContent = promptText;
      body.appendChild(t);
    }
  }
  for (const f of files) body.appendChild(makeCodeBlock('lua', f.content, f.name));
  content.appendChild(roleEl); content.appendChild(body);
  div.appendChild(content);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function buildApiQuestion(promptText, files) {
  let q = promptText || '';
  for (const f of files) q += `\n\n[FILE: ${f.name}]\n\`\`\`lua\n${f.content}\n\`\`\``;
  return q.trim();
}

function renderAttachBar() {
  attachBar.innerHTML = '';
  attachedFiles.forEach((f, idx) => {
    const chip = document.createElement('div');
    chip.className = 'attach-chip';
    chip.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
    const name = document.createElement('span');
    name.textContent = f.name;
    const rm = document.createElement('button');
    rm.className = 'attach-chip-remove';
    rm.textContent = '×';
    rm.onclick = () => { attachedFiles.splice(idx, 1); renderAttachBar(); };
    chip.appendChild(name); chip.appendChild(rm);
    attachBar.appendChild(chip);
  });
}

function addFiles(fileList) {
  const readers = [];
  for (const file of fileList) {
    if (!/\.(lua|luau|txt)$/i.test(file.name)) continue;
    readers.push(new Promise(res => {
      const fr = new FileReader();
      fr.onload = e => res({ name: file.name, content: e.target.result });
      fr.readAsText(file);
    }));
  }
  Promise.all(readers).then(results => { attachedFiles.push(...results); renderAttachBar(); });
}

attachBtn.onclick = () => fileInput.click();
fileInput.onchange = () => { addFiles(fileInput.files); fileInput.value = ''; };
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', e => { if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
inputEl.addEventListener('input', () => { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px'; });

function getModelLabel() {
  const sel = document.getElementById('modelSelect');
  return 'meteor-' + (sel ? sel.value.toLowerCase() : '1a');
}

function appendLoadingMsg() {
  const div = document.createElement('div');
  div.className = 'msg';
  div.appendChild(makeAiAvatar());
  const content = document.createElement('div');
  content.className = 'msg-content';
  const roleEl = document.createElement('div');
  roleEl.className = 'msg-role ai';
  roleEl.textContent = getModelLabel();
  const body = document.createElement('div');
  body.className = 'msg-body';
  const s = document.createElement('div'); s.className = 'spinner'; body.appendChild(s);
  content.appendChild(roleEl); content.appendChild(body);
  div.appendChild(content);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function createAiMsg() {
  const div = document.createElement('div');
  div.className = 'msg';
  div.appendChild(makeAiAvatar());
  const content = document.createElement('div');
  content.className = 'msg-content';
  const roleEl = document.createElement('div');
  roleEl.className = 'msg-role ai';
  roleEl.textContent = getModelLabel();
  const body = document.createElement('div');
  body.className = 'msg-body';
  content.appendChild(roleEl); content.appendChild(body);
  div.appendChild(content);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

async function send() {
  const promptText = inputEl.value.trim();
  if (!promptText && attachedFiles.length === 0) return;
  if (sendBtn.disabled) return;
  if (emptyState) { emptyState.remove(); emptyState = null; }

  const filesToSend = [...attachedFiles];
  renderUserMessage(promptText, filesToSend);
  inputEl.value = ''; inputEl.style.height = 'auto';
  attachedFiles = []; renderAttachBar();
  sendBtn.disabled = true;

  const apiQuestion = buildApiQuestion(promptText, filesToSend);
  const thinkingMsg = appendLoadingMsg();

  try {
    const encoded = btoa(unescape(encodeURIComponent(apiQuestion)));
    const selectedModel = document.getElementById('modelSelect').value;
    const res = await fetch(`https://api.getcomet.space/ai?question=${encoded}&model=${selectedModel}`);
    const data = await res.json();
    let content = '', reasoning = '';
    const choices = data.choices || [];
    if (choices.length > 0) {
      const msg = choices[0].message || {};
      content = msg.content || '';
      reasoning = msg.reasoning || msg.reasoning_content || '';
    }
    thinkingMsg.remove();
    const aiMsg = createAiMsg();
    const body = aiMsg.querySelector('.msg-body');
    if (reasoning) {
      const block = document.createElement('div');
      block.className = 'thinking-block';
      const toggle = document.createElement('button');
      toggle.className = 'thinking-toggle';
      toggle.innerHTML = '<span>▸</span> reasoning';
      const thinkContent = document.createElement('div');
      thinkContent.className = 'thinking-content';
      thinkContent.textContent = reasoning;
      toggle.addEventListener('click', () => {
        const open = thinkContent.classList.toggle('open');
        toggle.querySelector('span').textContent = open ? '▾' : '▸';
      });
      block.appendChild(toggle); block.appendChild(thinkContent); body.appendChild(block);
    }
    content = content.replace(/\s*\/n\s*/g, '\n');
    await revealContent(content, body);
  } catch(err) {
    thinkingMsg.remove();
    const fb = createAiMsg();
    fb.querySelector('.msg-body').textContent = 'something went wrong. try again.';
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

if (window.location.pathname === "/chat/") {
  window.history.replaceState({}, "", "/");
}
