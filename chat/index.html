<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Comet AI - Meteor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--border:rgba(255,255,255,0.07);
  --text:#e8e8e8;--muted:rgba(255,255,255,0.35);--accent:#fff;
  --input-bg:rgba(255,255,255,0.04);
  --lua-kw:#c792ea;--lua-fn:#82aaff;--lua-str:#c3e88d;
  --lua-num:#f78c6c;--lua-comment:rgba(255,255,255,0.28);
  --lua-op:rgba(255,255,255,0.55);--lua-builtin:#ffcb6b;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center}
.noise{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
.wrap{position:relative;z-index:1;width:100%;max-width:740px;height:100vh;display:flex;flex-direction:column;padding:0 1rem}
header{display:flex;align-items:center;gap:.75rem;padding:1.4rem 0 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{width:26px;height:26px;opacity:.9}
.header-sub{margin-left:auto;font-size:.65rem;color:var(--muted);letter-spacing:.08em}
.model-select-wrap{position:relative;display:flex;align-items:center}
.model-select-wrap::after{content:'⌄';position:absolute;right:.5rem;top:50%;transform:translateY(-52%);font-size:.7rem;color:var(--muted);pointer-events:none;line-height:1}
.model-select{font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.12em;color:var(--accent);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:.25rem 1.6rem .25rem .6rem;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;text-transform:uppercase;transition:border-color .2s,background .2s}
.model-select:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2)}
.model-select option{background:#111;color:var(--text)}
.messages{flex:1;overflow-y:auto;padding:1.5rem 0;display:flex;flex-direction:column;gap:1.5rem;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;opacity:.35;pointer-events:none}
.empty-icon{width:48px;opacity:.5}
.empty-label{font-family:'Syne',sans-serif;font-size:.75rem;letter-spacing:.2em;color:var(--muted)}
.msg{display:flex;flex-direction:row;gap:.75rem;align-items:flex-start;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:2px}
.msg-avatar.ai-avatar{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1)}
.msg-avatar.ai-avatar img{width:16px;height:16px;opacity:.8}
.msg-avatar.user-avatar{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12)}
.msg-avatar.user-avatar svg{width:14px;height:14px;fill:rgba(255,255,255,0.5)}
.msg-content{display:flex;flex-direction:column;gap:.35rem;flex:1;min-width:0}
.msg-role{font-size:.6rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.msg-role.ai{color:rgba(255,255,255,0.5)}
.msg-body{font-size:.85rem;line-height:1.75;color:var(--text);word-break:break-word}
.msg-body.user{color:rgba(255,255,255,0.6);font-size:.8rem}
.msg-body p{margin:.25rem 0}.msg-body p:first-child{margin-top:0}.msg-body p:last-child{margin-bottom:0}
.msg-body strong{color:#fff;font-weight:600}
.msg-body em{font-style:italic;color:rgba(255,255,255,0.75)}
.msg-body h1,.msg-body h2,.msg-body h3,.msg-body h4{font-family:'Syne',sans-serif;font-weight:700;color:#fff;margin:.75rem 0 .3rem;line-height:1.3}
.msg-body h1{font-size:1.1rem}.msg-body h2{font-size:.95rem}.msg-body h3{font-size:.85rem}.msg-body h4{font-size:.8rem}
.msg-body ul,.msg-body ol{padding-left:1.25rem;margin:.3rem 0}
.msg-body li{margin:.15rem 0;line-height:1.65}
.msg-body hr{border:none;border-top:1px solid var(--border);margin:.75rem 0}
.msg-body a{color:rgba(255,255,255,0.75);text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(255,255,255,0.25);transition:color .2s}
.msg-body a:hover{color:#fff}
.msg-body code.inline-code{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:.1em .35em;font-family:'JetBrains Mono',monospace;font-size:.8em;color:#c3e88d}
.msg-body .tag-highlight{background:#fff;color:#000;border-radius:3px;padding:.05em .3em;font-size:.82em;font-family:'JetBrains Mono',monospace;font-weight:500}
.thinking-block{margin-bottom:.6rem;border-left:2px solid rgba(255,255,255,0.1);padding-left:.75rem}
.thinking-toggle{font-size:.6rem;letter-spacing:.12em;cursor:pointer;text-transform:uppercase;display:flex;align-items:center;gap:.4rem;background:none;border:none;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:0;margin-bottom:.3rem}
.thinking-toggle:hover{color:rgba(255,255,255,0.5)}
.thinking-content{font-size:.7rem;line-height:1.7;color:rgba(255,255,255,0.2);display:none;white-space:pre-wrap;word-break:break-word}
.thinking-content.open{display:block}
.code-block{margin:.4rem 0;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);background:#0d0d0d}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:.4rem .75rem;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.06)}
.code-lang{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.code-file-name{font-size:.6rem;color:rgba(255,255,255,0.3);margin-left:.5rem}
.copy-btn{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px solid rgba(255,255,255,0.1);color:var(--muted);padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s}
.copy-btn:hover{background:rgba(255,255,255,0.07);color:var(--text);border-color:rgba(255,255,255,0.2)}
.copy-btn.copied{color:#c3e88d;border-color:#c3e88d44}
.code-body{padding:.85rem 1rem;overflow-x:auto;font-size:.78rem;line-height:1.7;white-space:pre;font-family:'JetBrains Mono',monospace}
.code-body::-webkit-scrollbar{height:4px}
.code-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.lkw{color:var(--lua-kw)}.lfn{color:var(--lua-fn)}.lstr{color:var(--lua-str)}
.lnum{color:var(--lua-num)}.lcmt{color:var(--lua-comment);font-style:italic}
.lop{color:var(--lua-op)}.lbi{color:var(--lua-builtin)}
.pasted-label{font-size:.55rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:.15rem;opacity:.7}
.file-chip-msg{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:.3rem .65rem;font-size:.7rem;color:rgba(255,255,255,0.6);cursor:pointer;transition:background .2s,border-color .2s;margin:.2rem 0;max-width:240px}
.file-chip-msg:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.2);color:var(--text)}
.file-chip-msg svg{flex-shrink:0;opacity:.7}
.file-chip-msg span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.file-popup{background:#0d0d0d;border:1px solid rgba(255,255,255,0.1);border-radius:10px;width:min(700px,94vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden;animation:popIn .18s ease}
@keyframes popIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.file-popup-header{display:flex;align-items:center;justify-content:space-between;padding:.55rem .9rem;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);flex-shrink:0}
.file-popup-name{font-size:.68rem;letter-spacing:.1em;color:rgba(255,255,255,0.55)}
.file-popup-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;line-height:1;padding:.1rem .35rem;border-radius:4px;transition:color .2s}
.file-popup-close:hover{color:var(--text)}
.file-popup-body{overflow-y:auto;padding:.85rem 1rem;font-size:.78rem;line-height:1.7;white-space:pre;font-family:'JetBrains Mono',monospace;flex:1;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
.file-popup-body::-webkit-scrollbar{width:4px}
.file-popup-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.msg-actions{display:flex;gap:.4rem;margin-top:.25rem;align-items:center;flex-wrap:wrap}
.retry-btn{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px solid rgba(255,255,255,0.08);color:var(--muted);padding:.18rem .5rem;border-radius:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s;display:flex;align-items:center;gap:.3rem}
.retry-btn:hover{background:rgba(255,255,255,0.06);color:var(--text);border-color:rgba(255,255,255,0.18)}
.retry-btn svg{width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* ── Sources strip ─────────────────────────────────────────── */
.sources-strip{display:inline-flex;align-items:center;gap:.45rem;cursor:pointer;position:relative;padding:.2rem .55rem .2rem .35rem;border:1px solid rgba(255,255,255,0.1);border-radius:999px;background:rgba(255,255,255,0.03);transition:background .2s,border-color .2s}
.sources-strip:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2)}
.sources-favicons{display:flex;align-items:center}
.sources-favicons .fav{width:16px;height:16px;border-radius:3px;border:1.5px solid rgba(255,255,255,0.12);background:#1a1a1a;object-fit:contain;flex-shrink:0;transition:transform .15s}
.sources-favicons .fav:not(:first-child){margin-left:-5px}
.sources-favicons .fav-fallback{width:16px;height:16px;border-radius:3px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sources-favicons .fav-fallback:not(:first-child){margin-left:-5px}
.sources-favicons .fav-fallback svg{width:8px;height:8px;opacity:.45}
.sources-more{font-size:.58rem;letter-spacing:.06em;color:var(--muted);white-space:nowrap}
.sources-label{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap;font-family:'JetBrains Mono',monospace}
.sources-strip:hover .fav{transform:scale(1.1)}

/* Sources popup */
.sources-popup{position:absolute;bottom:calc(100% + 8px);left:0;background:#111;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:.5rem;min-width:240px;max-width:320px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.6);animation:popIn .15s ease}
.sources-popup-title{font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:.2rem .4rem .45rem;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:.35rem}
.sources-popup-item{display:flex;align-items:center;gap:.55rem;padding:.3rem .4rem;border-radius:5px;text-decoration:none;transition:background .15s;cursor:pointer}
.sources-popup-item:hover{background:rgba(255,255,255,0.06)}
.sources-popup-item .si-fav{width:16px;height:16px;border-radius:3px;object-fit:contain;flex-shrink:0;background:#1a1a1a}
.sources-popup-item .si-fav-fb{width:16px;height:16px;border-radius:3px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sources-popup-item .si-fav-fb svg{width:8px;height:8px;opacity:.4}
.sources-popup-item .si-url{font-size:.65rem;color:rgba(255,255,255,0.55);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sources-popup-item:hover .si-url{color:rgba(255,255,255,0.8)}

/* Edit panel */
.edit-panel{position:fixed;top:0;right:0;bottom:0;width:min(520px,90vw);background:#0a0a0a;border-left:1px solid rgba(255,255,255,0.09);z-index:150;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.22,.68,0,1.2)}
.edit-panel.open{transform:translateX(0)}
.edit-panel-header{display:flex;align-items:center;gap:.6rem;padding:.65rem .9rem;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.025);flex-shrink:0}
.edit-panel-title{font-size:.68rem;letter-spacing:.1em;color:rgba(255,255,255,0.55);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edit-panel-badge{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;background:rgba(195,232,141,0.12);color:#c3e88d;border:1px solid rgba(195,232,141,0.2);border-radius:3px;padding:.1rem .35rem;flex-shrink:0}
.edit-panel-btns{display:flex;gap:.4rem;flex-shrink:0}
.edit-panel-btn{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--muted);padding:.18rem .5rem;border-radius:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;display:flex;align-items:center;gap:.25rem}
.edit-panel-btn:hover{background:rgba(255,255,255,0.07);color:var(--text);border-color:rgba(255,255,255,0.2)}
.edit-panel-btn.copied{color:#c3e88d;border-color:#c3e88d44}
.edit-panel-btn svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.edit-panel-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.edit-panel-tab{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;background:none;border:none;color:var(--muted);padding:.45rem .8rem;cursor:pointer;font-family:'JetBrains Mono',monospace;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;margin-bottom:-1px}
.edit-panel-tab:hover{color:rgba(255,255,255,0.5)}
.edit-panel-tab.active{color:var(--text);border-bottom-color:rgba(255,255,255,0.4)}
.edit-panel-body{flex:1;overflow:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
.edit-panel-body::-webkit-scrollbar{width:4px}
.edit-panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.ep-lines{padding:.85rem 1rem;font-size:.77rem;line-height:1.7;font-family:'JetBrains Mono',monospace;white-space:pre}
.ep-line{display:block}
.ep-line.removing{animation:lineRemove .22s ease forwards}
@keyframes lineRemove{0%{opacity:1;max-height:2em}100%{opacity:0;max-height:0;padding:0;margin:0;overflow:hidden}}
.ep-line.inserting{animation:lineInsert .18s ease forwards}
@keyframes lineInsert{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
.edit-chip{display:inline-flex;align-items:center;gap:.4rem;background:rgba(195,232,141,0.07);border:1px solid rgba(195,232,141,0.2);border-radius:6px;padding:.28rem .6rem;font-size:.68rem;color:rgba(195,232,141,0.8);cursor:pointer;transition:background .2s,border-color .2s;margin:.3rem 0}
.edit-chip:hover{background:rgba(195,232,141,0.13);border-color:rgba(195,232,141,0.4);color:#c3e88d}
.edit-chip svg{flex-shrink:0;opacity:.8}
.edit-backdrop{position:fixed;inset:0;z-index:149;display:none}
.edit-backdrop.visible{display:block}
.spinner{display:inline-block;width:14px;height:14px;border:1.5px solid rgba(255,255,255,0.1);border-top-color:rgba(255,255,255,0.5);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.input-area{flex-shrink:0;border-top:1px solid var(--border);padding:.75rem 0 1.25rem;display:flex;flex-direction:column;gap:.5rem}
.attachments-bar{display:flex;flex-wrap:wrap;gap:.4rem}
.attach-chip{display:flex;align-items:center;gap:.35rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:.2rem .5rem;font-size:.65rem;color:rgba(255,255,255,0.55);max-width:200px}
.attach-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-chip-remove{background:none;border:none;color:var(--muted);cursor:pointer;padding:0;line-height:1;font-size:.75rem;flex-shrink:0}
.attach-chip-remove:hover{color:var(--text)}
.input-row{display:flex;gap:.75rem;align-items:flex-end}
.drop-zone{position:relative;flex:1}
.drop-zone.drag-over textarea{border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.07)}
.drop-hint{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:.7rem;letter-spacing:.1em;color:rgba(255,255,255,0.4);pointer-events:none;border-radius:8px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.2)}
.drop-zone.drag-over .drop-hint{display:flex}
textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:.7rem .85rem;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.6;resize:none;outline:none;max-height:140px;transition:border-color .2s,background .2s}
textarea::placeholder{color:var(--muted)}
textarea:focus{border-color:rgba(255,255,255,0.18)}
.btns{display:flex;gap:.5rem;flex-shrink:0;align-items:flex-end}
.send-btn{background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,border-color .2s;flex-shrink:0}
.send-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.send-btn svg{width:16px;height:16px;fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.attach-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,border-color .2s;flex-shrink:0;color:var(--muted)}
.attach-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:var(--text)}
.attach-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="noise"></div>
<div class="wrap">
  <header>
    <img class="logo" src="assets/comet_2.png" alt="Comet" />
    <div class="model-select-wrap">
      <select id="modelSelect" class="model-select"><option value="1A">Meteor-1A</option></select>
    </div>
    <span class="header-sub">by comet</span>
  </header>
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <img class="empty-icon" src="assets/comet_2.png" alt="" />
      <span class="empty-label">Ask Meteor anything</span>
    </div>
  </div>
  <div class="input-area">
    <div class="attachments-bar" id="attachBar"></div>
    <div class="input-row">
      <div class="drop-zone" id="dropZone">
        <textarea id="input" rows="1" placeholder="message meteor... or drop .lua files"></textarea>
        <div class="drop-hint">drop lua files here</div>
      </div>
      <div class="btns">
        <button class="attach-btn" id="attachBtn" title="attach lua file">
          <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const inputEl    = document.getElementById('input');
const messages   = document.getElementById('messages');
const sendBtn    = document.getElementById('sendBtn');
const attachBtn  = document.getElementById('attachBtn');
const fileInput  = document.getElementById('fileInput');
const attachBar  = document.getElementById('attachBar');
const dropZone   = document.getElementById('dropZone');
let emptyState   = document.getElementById('emptyState');

let attachedFiles   = [];
let lastPromptText  = '';
let lastFilesToSend = [];

// ── File store ────────────────────────────────────────────────────────────────
const fileStore = {};
function getEntry(name) { return fileStore[name.toLowerCase()] ?? null; }
function setContent(name, content) { const k=name.toLowerCase(); fileStore[k]=fileStore[k]??{}; fileStore[k].content=content; }
function setPrev(name, prev) { const k=name.toLowerCase(); if(fileStore[k])fileStore[k].prevContent=prev; }
function seedStore(files) { for(const f of files)setContent(f.name,f.content); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ── Sources / favicons ────────────────────────────────────────────────────────
function getDomain(url) {
  try { return new URL(url).hostname; } catch { return url; }
}
function getFaviconUrl(url) {
  try {
    const domain = new URL(url).origin;
    return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=32`;
  } catch { return null; }
}

function makeFavImg(url, size) {
  const favUrl = getFaviconUrl(url);
  if (!favUrl) {
    const fb = document.createElement('div');
    fb.className = 'fav-fallback';
    fb.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
    return fb;
  }
  const img = document.createElement('img');
  img.className = 'fav';
  img.src = favUrl;
  img.alt = getDomain(url);
  img.width = size || 16;
  img.height = size || 16;
  img.onerror = () => { img.style.display='none'; };
  return img;
}

let activeSourcesPopup = null;

function closeSourcesPopup() {
  if (activeSourcesPopup) { activeSourcesPopup.remove(); activeSourcesPopup = null; }
}

function makeSourcesStrip(visitedUrls) {
  if (!visitedUrls || visitedUrls.length === 0) return null;

  const MAX_SHOWN = 3;
  const strip = document.createElement('div');
  strip.className = 'sources-strip';

  const favsWrap = document.createElement('div');
  favsWrap.className = 'sources-favicons';

  const shown = visitedUrls.slice(0, MAX_SHOWN);
  for (const url of shown) favsWrap.appendChild(makeFavImg(url, 16));
  strip.appendChild(favsWrap);

  if (visitedUrls.length > MAX_SHOWN) {
    const more = document.createElement('span');
    more.className = 'sources-more';
    more.textContent = `+${visitedUrls.length - MAX_SHOWN}`;
    strip.appendChild(more);
  }

  const label = document.createElement('span');
  label.className = 'sources-label';
  label.textContent = 'sources';
  strip.appendChild(label);

  // Click → toggle popup
  strip.addEventListener('click', (e) => {
    e.stopPropagation();
    if (activeSourcesPopup && strip.contains(activeSourcesPopup)) {
      closeSourcesPopup(); return;
    }
    closeSourcesPopup();

    const popup = document.createElement('div');
    popup.className = 'sources-popup';
    const title = document.createElement('div');
    title.className = 'sources-popup-title';
    title.textContent = `${visitedUrls.length} source${visitedUrls.length !== 1 ? 's' : ''} visited`;
    popup.appendChild(title);

    for (const url of visitedUrls) {
      const item = document.createElement('a');
      item.className = 'sources-popup-item';
      item.href = url;
      item.target = '_blank';
      item.rel = 'noopener noreferrer';

      const favEl = makeFavImg(url, 16);
      favEl.className = favEl.classList.contains('fav') ? 'si-fav' : 'si-fav-fb';
      item.appendChild(favEl);

      const label = document.createElement('span');
      label.className = 'si-url';
      label.textContent = getDomain(url);
      label.title = url;
      item.appendChild(label);

      popup.appendChild(item);
    }

    strip.appendChild(popup);
    activeSourcesPopup = popup;
  });

  return strip;
}

document.addEventListener('click', closeSourcesPopup);

// ── Lua highlighter ───────────────────────────────────────────────────────────
const LUA_KW=new Set(['and','break','do','else','elseif','end','false','for','function','goto','if','in','local','nil','not','or','repeat','return','then','true','until','while']);
const LUA_BI=new Set(['print','pairs','ipairs','tostring','tonumber','type','error','assert','pcall','xpcall','select','unpack','rawget','rawset','rawequal','rawlen','require','load','loadfile','loadstring','dofile','collectgarbage','getmetatable','setmetatable','next','task','game','workspace','script','Instance','Vector3','Vector2','CFrame','Color3','UDim','UDim2','TweenInfo','Enum','wait','spawn','delay','math','table','string','os','coroutine','bit32','getfenv','setfenv','getrawmetatable','setrawmetatable','hookfunction','newcclosure','checkcaller','iscclosure','islclosure','clonefunction','Drawing','writefile','readfile','listfiles','makefolder','delfolder','delfile','HttpGet','request','http','syn','_G','shared']);

function luaHighlight(code){
  const out=[];let i=0;
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  while(i<code.length){
    if(code[i]==='-'&&code[i+1]==='-'){let e=code.indexOf('\n',i);if(e<0)e=code.length;out.push(`<span class="lcmt">${esc(code.slice(i,e))}</span>`);i=e;continue;}
    if(code[i]==='"'||code[i]==="'"){const q=code[i];let j=i+1;while(j<code.length&&code[j]!==q){if(code[j]==='\\')j++;j++;}out.push(`<span class="lstr">${esc(code.slice(i,j+1))}</span>`);i=j+1;continue;}
    if(code[i]==='['&&(code[i+1]==='['||code[i+1]==='=')){let lv=0,k=i+1;while(code[k]==='='){lv++;k++;}if(code[k]==='['){const cl=']'+'='.repeat(lv)+']';let e=code.indexOf(cl,k+1);if(e<0)e=code.length-cl.length;out.push(`<span class="lstr">${esc(code.slice(i,e+cl.length))}</span>`);i=e+cl.length;continue;}}
    const nm=code.slice(i).match(/^(0x[\da-fA-F]+|\d+\.?\d*([eE][+-]?\d+)?)/);
    if(nm&&(i===0||!/\w/.test(code[i-1]))){out.push(`<span class="lnum">${esc(nm[0])}</span>`);i+=nm[0].length;continue;}
    const wm=code.slice(i).match(/^[a-zA-Z_]\w*/);
    if(wm){const w=wm[0];if(LUA_KW.has(w))out.push(`<span class="lkw">${esc(w)}</span>`);else if(LUA_BI.has(w))out.push(`<span class="lbi">${esc(w)}</span>`);else{const after=code.slice(i+w.length).replace(/^[\s\n]*/,'');out.push(after[0]==='('||after[0]==='{'?`<span class="lfn">${esc(w)}</span>`:esc(w));}i+=w.length;continue;}
    const om=code.slice(i).match(/^[+\-*\/^%#&|~<>=.,:;(){}[\]]/);
    if(om){out.push(`<span class="lop">${esc(om[0])}</span>`);i+=om[0].length;continue;}
    out.push(esc(code[i]));i++;
  }
  return out.join('');
}
function hlLine(line,isLua){return isLua?luaHighlight(line):escHtml(line);}

// ── Code blocks (chat) ────────────────────────────────────────────────────────
function makeCodeBlock(lang,code,fileName){
  const wrap=document.createElement('div');wrap.className='code-block';
  const hdr=document.createElement('div');hdr.className='code-header';
  const left=document.createElement('div');left.style.cssText='display:flex;align-items:center;gap:.4rem';
  const lbl=document.createElement('span');lbl.className='code-lang';lbl.textContent=lang||'code';left.appendChild(lbl);
  if(fileName){const fn=document.createElement('span');fn.className='code-file-name';fn.textContent=fileName;left.appendChild(fn);}
  const btn=document.createElement('button');btn.className='copy-btn';btn.textContent='copy';
  const codeRef={value:code};
  btn.onclick=()=>navigator.clipboard.writeText(codeRef.value).then(()=>{btn.textContent='copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='copy';btn.classList.remove('copied');},2000);});
  hdr.appendChild(left);hdr.appendChild(btn);
  const body=document.createElement('div');body.className='code-body';
  /^lua$/i.test(lang)?body.innerHTML=luaHighlight(code):body.textContent=code;
  wrap.appendChild(hdr);wrap.appendChild(body);
  wrap._codeRef=codeRef;
  return wrap;
}

// ── Markdown helpers ──────────────────────────────────────────────────────────
function parseSegments(text){
  const segs=[],re=/```([\w]*)\n([\s\S]*?)```/g;let last=0,m;re.lastIndex=0;
  while((m=re.exec(text))!==null){if(m.index>last)segs.push({type:'text',value:text.slice(last,m.index)});segs.push({type:'code',lang:m[1].trim()||'',value:m[2].replace(/\n$/,'')});last=m.index+m[0].length;}
  if(last<text.length){const t=text.slice(last);if(t.trim())segs.push({type:'text',value:t});}
  return segs;
}
function inlineMarkdown(text){
  let res='',i=0;
  const P=[
    {re:/`([^`\n]+)`/,fn:m=>`<code class="inline-code">${escHtml(m[1])}</code>`},
    {re:/\*\*([^*\n]+)\*\*/,fn:m=>`<strong>${inlineMarkdown(m[1])}</strong>`},
    {re:/\*([^*\n]+)\*/,fn:m=>`<em>${inlineMarkdown(m[1])}</em>`},
    {re:/\[([^\]]+)\]\(([^)]+)\)/,fn:m=>`<a href="${escHtml(m[2])}" target="_blank" rel="noopener">${escHtml(m[1])}</a>`},
    {re:/<([^>\/][^>]*)>/,fn:m=>`<span class="tag-highlight">${escHtml(m[1])}</span>`},
  ];
  while(i<text.length){
    let ei=-1,em=null,ef=null;
    for(const p of P){const m=p.re.exec(text.slice(i));if(m&&(ei<0||m.index<ei)){ei=m.index;em=m;ef=p.fn;}}
    if(ei<0){res+=escHtml(text.slice(i));break;}
    res+=escHtml(text.slice(i,i+ei))+ef(em);i+=ei+em[0].length;
  }
  return res.replace(/\n/g,'<br>');
}
function renderTextBlock(text,container){
  const lines=text.split('\n');let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(!line.trim()){i++;continue;}
    const hm=line.match(/^(#{1,4})\s+(.+)/);
    if(hm){const el=document.createElement('h'+hm[1].length);el.innerHTML=inlineMarkdown(hm[2]);container.appendChild(el);i++;continue;}
    if(/^[-*_]{3,}$/.test(line.trim())){container.appendChild(document.createElement('hr'));i++;continue;}
    if(/^[\-\*\+]\s/.test(line)){const ul=document.createElement('ul');while(i<lines.length&&/^[\-\*\+]\s/.test(lines[i])){const li=document.createElement('li');li.innerHTML=inlineMarkdown(lines[i].replace(/^[\-\*\+]\s/,''));ul.appendChild(li);i++;}container.appendChild(ul);continue;}
    if(/^\d+\.\s/.test(line)){const ol=document.createElement('ol');while(i<lines.length&&/^\d+\.\s/.test(lines[i])){const li=document.createElement('li');li.innerHTML=inlineMarkdown(lines[i].replace(/^\d+\.\s/,''));ol.appendChild(li);i++;}container.appendChild(ol);continue;}
    let pl=[];
    while(i<lines.length){const l=lines[i];if(!l.trim()){i++;break;}if(/^#{1,4}\s/.test(l)||/^[\-\*\+]\s/.test(l)||/^\d+\.\s/.test(l)||/^[-*_]{3,}$/.test(l.trim()))break;pl.push(l);i++;}
    if(pl.length){const p=document.createElement('p');p.innerHTML=inlineMarkdown(pl.join('\n'));container.appendChild(p);}
  }
}

// ── Chat streaming ────────────────────────────────────────────────────────────
async function revealContent(text,container){
  for(const seg of parseSegments(text)){
    if(seg.type==='code'){if(!seg.value.trim()&&!seg.lang)continue;const cb=makeCodeBlock(seg.lang,'');const bodyEl=cb.querySelector('.code-body');container.appendChild(cb);await typeCodeBlock(seg.lang,seg.value,bodyEl);}
    else await streamWords(seg.value,container);
    messages.scrollTop=messages.scrollHeight;
  }
}
async function streamWords(text,container){
  const tokens=text.split(/(\s+)/);let buf='';
  const sub=document.createElement('div');container.appendChild(sub);
  for(const tok of tokens){buf+=tok;sub.innerHTML='';renderTextBlock(buf,sub);messages.scrollTop=messages.scrollHeight;if(!/^\s+$/.test(tok)&&tok.length)await sleep(18+Math.random()*22);}
}
async function typeCodeBlock(lang,code,bodyEl){
  const wrap=bodyEl.closest('.code-block');
  if(wrap?._codeRef)wrap._codeRef.value=code;
  const isLua=/^lua$/i.test(lang);let typed='';
  for(const ch of code){typed+=ch;isLua?bodyEl.innerHTML=luaHighlight(typed):bodyEl.textContent=typed;messages.scrollTop=messages.scrollHeight;let d=6;if(ch==='\n')d=14;else if(ch===' ')d=3;if(Math.random()<.04)d+=25;await sleep(d);}
}

// ── Avatars ───────────────────────────────────────────────────────────────────
function makeAiAvatar(){const av=document.createElement('div');av.className='msg-avatar ai-avatar';const img=document.createElement('img');img.src='assets/comet_2.png';img.alt='Meteor';av.appendChild(img);return av;}
function makeUserAvatar(){const av=document.createElement('div');av.className='msg-avatar user-avatar';av.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>`;return av;}
function looksLikeCode(t){const p=[/\blocal\s+\w+/,/\bfunction\s+\w+/,/\bend\b/,/\bfor\s+\w+\s*=/,/\bif\s+.+\bthen\b/,/game[:.]GetService/,/workspace\./,/Instance\.new/,/task\.wait/,/pairs\s*\(/];const m=p.filter(r=>r.test(t)).length;return m>=2||(t.split('\n').length>=4&&m>=1);}

function renderUserMessage(promptText,files){
  const div=document.createElement('div');div.className='msg';div.appendChild(makeUserAvatar());
  const content=document.createElement('div');content.className='msg-content';
  const roleEl=document.createElement('div');roleEl.className='msg-role';roleEl.textContent='you';
  const body=document.createElement('div');body.className='msg-body user';
  if(promptText){if(looksLikeCode(promptText)){const lbl=document.createElement('div');lbl.className='pasted-label';lbl.textContent='pasted code';body.appendChild(lbl);body.appendChild(makeCodeBlock('lua',promptText));}else{const t=document.createElement('span');t.style.whiteSpace='pre-wrap';t.textContent=promptText;body.appendChild(t);}}
  if(files.length){const fr=document.createElement('div');fr.style.cssText='display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem';for(const f of files)fr.appendChild(makeFileChip(f.name,f.content));body.appendChild(fr);}
  content.appendChild(roleEl);content.appendChild(body);div.appendChild(content);messages.appendChild(div);messages.scrollTop=messages.scrollHeight;
}

function openFilePopup(name,content){
  const overlay=document.createElement('div');overlay.className='file-popup-overlay';overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  const popup=document.createElement('div');popup.className='file-popup';
  const hdr=document.createElement('div');hdr.className='file-popup-header';
  const nl=document.createElement('span');nl.className='file-popup-name';nl.textContent=name;
  const cb=document.createElement('button');cb.className='file-popup-close';cb.textContent='×';cb.onclick=()=>overlay.remove();
  hdr.appendChild(nl);hdr.appendChild(cb);
  const body=document.createElement('div');body.className='file-popup-body';body.innerHTML=luaHighlight(content);
  popup.appendChild(hdr);popup.appendChild(body);overlay.appendChild(popup);document.body.appendChild(overlay);
}
function makeFileChip(name,content){
  const chip=document.createElement('div');chip.className='file-chip-msg';chip.title='click to view '+name;
  chip.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>${escHtml(name)}</span>`;
  chip.onclick=()=>openFilePopup(name,content);return chip;
}

function buildApiQuestion(promptText,files){
  let q=promptText||'';
  for(const f of files){const e=getEntry(f.name);const c=e?e.content:f.content;const n=c.split('\n').map((l,i)=>`${String(i+1).padStart(4,' ')} | ${l}`).join('\n');q+=`\n\n[FILE: ${f.name}]\n\`\`\`lua\n${n}\n\`\`\``;}
  return q.trim();
}

function renderAttachBar(){
  attachBar.innerHTML='';
  attachedFiles.forEach((f,idx)=>{
    const chip=document.createElement('div');chip.className='attach-chip';
    chip.innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
    const name=document.createElement('span');name.textContent=f.name;
    const rm=document.createElement('button');rm.className='attach-chip-remove';rm.textContent='×';rm.onclick=()=>{attachedFiles.splice(idx,1);renderAttachBar();};
    chip.appendChild(name);chip.appendChild(rm);attachBar.appendChild(chip);
  });
}
function addFiles(fileList){
  const readers=[];
  for(const file of fileList){if(!/\.(lua|luau|txt)$/i.test(file.name))continue;readers.push(new Promise(res=>{const fr=new FileReader();fr.onload=e=>res({name:file.name,content:e.target.result});fr.readAsText(file);}));}
  Promise.all(readers).then(results=>{attachedFiles.push(...results);seedStore(results);renderAttachBar();});
}
attachBtn.onclick=()=>fileInput.click();
fileInput.onchange=()=>{addFiles(fileInput.files);fileInput.value='';};

dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');addFiles(e.dataTransfer.files);});

// ── Edit panel ────────────────────────────────────────────────────────────────
const editPanel    = document.getElementById('editPanel');
const editBackdrop = document.getElementById('editBackdrop');
const editTitle    = document.getElementById('editPanelTitle');
const editTabs     = document.getElementById('editPanelTabs');
const editBodyEl   = document.getElementById('editPanelBody');
const editDlBtn    = document.getElementById('editDownloadBtn');
const editCopyBtn  = document.getElementById('editCopyBtn');
const editCloseBtn = document.getElementById('editCloseBtn');
let currentEditFile={name:'',content:''};

function renderLinesInstant(content,name){
  const isLua=/\.lua[u]?$/i.test(name);
  const wrap=document.createElement('div');wrap.className='ep-lines';
  for(const line of content.split('\n')){const s=document.createElement('span');s.className='ep-line';s.innerHTML=hlLine(line,isLua);wrap.appendChild(s);}
  return wrap;
}

async function animateDiff(prevContent,newContent,hunks,name){
  const isLua=/\.lua[u]?$/i.test(name);
  editBodyEl.innerHTML='';
  const wrap=renderLinesInstant(prevContent,name);
  editBodyEl.appendChild(wrap);
  for(const h of [...hunks].sort((a,b)=>b.start-a.start)){
    const allLines=wrap.querySelectorAll('.ep-line');
    const removeStart=h.start-1;
    const removeCount=h.mode==='insert'?0:h.end-h.start+1;
    const toRemove=[];
    for(let i=removeStart;i<removeStart+removeCount;i++){if(allLines[i])toRemove.push(allLines[i]);}
    for(const el of toRemove)el.classList.add('removing');
    if(toRemove.length)await sleep(260);
    for(const el of toRemove)el.remove();
    const repLines=h.replacement?h.replacement.split('\n'):[];
    const refNode=wrap.querySelectorAll('.ep-line')[removeStart]??null;
    for(const repLine of repLines){
      const s=document.createElement('span');s.className='ep-line inserting';wrap.insertBefore(s,refNode);
      editBodyEl.scrollTop=editBodyEl.scrollHeight;
      let typed='';
      for(const ch of repLine){typed+=ch;s.innerHTML=hlLine(typed,isLua);editBodyEl.scrollTop=editBodyEl.scrollHeight;await sleep(5+Math.random()*8);}
      await sleep(8);
    }
  }
}

function openEditPanel(name){
  const entry=getEntry(name);const content=entry?entry.content:'';
  currentEditFile={name,content};editTitle.textContent=name;
  const isHtml=/\.html?$/i.test(name);
  editTabs.innerHTML='';
  ['code',...(isHtml?['preview']:[])].forEach(tab=>{
    const btn=document.createElement('button');btn.className='edit-panel-tab'+(tab==='code'?' active':'');btn.dataset.tab=tab;btn.textContent=tab;
    btn.onclick=()=>switchEditTab(tab);editTabs.appendChild(btn);
  });
  editBodyEl.innerHTML='';editBodyEl.appendChild(renderLinesInstant(content,name));
  editPanel.classList.add('open');editBackdrop.classList.add('visible');
}

async function openEditPanelAnimated(name,hunks,firstTime){
  const entry=getEntry(name);const content=entry?entry.content:'';const prev=entry?entry.prevContent??content:content;
  currentEditFile={name,content};editTitle.textContent=name;
  const isHtml=/\.html?$/i.test(name);
  editTabs.innerHTML='';
  ['code',...(isHtml?['preview']:[])].forEach(tab=>{
    const btn=document.createElement('button');btn.className='edit-panel-tab'+(tab==='code'?' active':'');btn.dataset.tab=tab;btn.textContent=tab;
    btn.onclick=()=>switchEditTab(tab);editTabs.appendChild(btn);
  });
  editPanel.classList.add('open');editBackdrop.classList.add('visible');
  if(firstTime){
    const isLua=/\.lua[u]?$/i.test(name);editBodyEl.innerHTML='';
    const wrap=document.createElement('div');wrap.className='ep-lines';editBodyEl.appendChild(wrap);
    for(const line of content.split('\n')){
      const s=document.createElement('span');s.className='ep-line';wrap.appendChild(s);let typed='';
      for(const ch of line){typed+=ch;s.innerHTML=hlLine(typed,isLua);editBodyEl.scrollTop=editBodyEl.scrollHeight;let d=4;if(Math.random()<.03)d+=18;await sleep(d);}
      await sleep(9);
    }
  } else {
    await animateDiff(prev,content,hunks,name);
  }
}

function switchEditTab(tab){
  editTabs.querySelectorAll('.edit-panel-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  if(tab==='preview'){editBodyEl.innerHTML='';const iframe=document.createElement('iframe');iframe.className='edit-panel-preview';iframe.sandbox='allow-scripts allow-same-origin';editBodyEl.appendChild(iframe);iframe.contentDocument.open();iframe.contentDocument.write(currentEditFile.content);iframe.contentDocument.close();}
  else{editBodyEl.innerHTML='';editBodyEl.appendChild(renderLinesInstant(currentEditFile.content,currentEditFile.name));}
}

function closeEditPanel(){editPanel.classList.remove('open');editBackdrop.classList.remove('visible');}
editCloseBtn.onclick=closeEditPanel;
editBackdrop.onclick=closeEditPanel;
editDlBtn.onclick=()=>{const blob=new Blob([currentEditFile.content],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=currentEditFile.name;a.click();URL.revokeObjectURL(a.href);};
editCopyBtn.onclick=()=>{
  navigator.clipboard.writeText(currentEditFile.content).then(()=>{
    editCopyBtn.textContent='copied!';editCopyBtn.classList.add('copied');
    setTimeout(()=>{editCopyBtn.innerHTML='<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>copy';editCopyBtn.classList.remove('copied');},2000);
  });
};

// ── [EDIT] diff parser ────────────────────────────────────────────────────────
function applyHunks(srcContent,hunks){
  const lines=[...srcContent.split('\n')];
  for(const h of [...hunks].sort((a,b)=>b.start-a.start)){
    const rep=h.replacement?h.replacement.split('\n'):[];
    h.mode==='insert'?lines.splice(h.start-1,0,...rep):lines.splice(h.start-1,h.end-h.start+1,...rep);
  }
  return lines.join('\n');
}

function parseEditBlocks(text,knownFiles){
  const edits=[];
  const cleanText=text.replace(/\[EDIT:\s*([^\]]+)\]([\s\S]*?)\[\/EDIT\]/g,(full,fileName,body)=>{
    fileName=fileName.trim();
    const e=getEntry(fileName);
    const src=e?e.content:(knownFiles.find(f=>f.name.toLowerCase()===fileName.toLowerCase())?.content??'');
    const hunks=[];
    const re=/@@(\d+)(-(\d+)|(\+))?\n([\s\S]*?)(?=@@\d+|$)/g;let m;
    while((m=re.exec(body.trim()+'\n'))!==null){
      const start=parseInt(m[1],10),isIns=m[4]==='+',end=isIns?start:(m[3]?parseInt(m[3],10):start);
      hunks.push({start,end,mode:isIns?'insert':'replace',replacement:m[5].replace(/\n$/,'')});
    }
    setPrev(fileName,src);
    const result=applyHunks(src,hunks);
    setContent(fileName,result);
    const isFirst=!e;
    edits.push({name:fileName,hunks,isFirst});
    return '__EDIT_CHIP_'+(edits.length-1)+'__';
  });
  return{cleanText,edits};
}

function makeEditChip(edit){
  const chip=document.createElement('div');chip.className='edit-chip';
  const cl=edit.hunks.length+' change'+(edit.hunks.length!==1?'s':'');
  chip.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'
    +`<span>${escHtml(edit.name)}</span><span style="opacity:.45;font-size:.6rem">${cl}</span>`;
  chip.onclick=()=>openEditPanel(edit.name);
  return chip;
}

// ── Strip fetch tags from displayed content (safety net) ──────────────────────
function stripFetchTagsFromDisplay(text) {
  return text
    .replace(/\[FETCH(?:JSON)?:\s*https?:\/\/[^\]]+\]/gi, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

// ── Core AI request ───────────────────────────────────────────────────────────
async function doAiRequest(promptText,files){
  const loading=appendLoadingMsg();
  try{
    const model=document.getElementById('modelSelect').value;
    const data=await fetch('https://api.getcomet.space/ai',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:buildApiQuestion(promptText,files),model})
    }).then(r=>r.json());

    let content='',reasoning='';
    if(data.choices?.[0]){const msg=data.choices[0].message||{};content=msg.content||'';reasoning=msg.reasoning||msg.reasoning_content||'';}

    // Strip any [FETCH:] tags that leaked into the final content
    content = stripFetchTagsFromDisplay(content);

    const visitedUrls = Array.isArray(data.visitedUrls) ? data.visitedUrls : [];

    loading.remove();
    const{body,actions}=createAiMsg();

    if(reasoning){
      const block=document.createElement('div');block.className='thinking-block';
      const tog=document.createElement('button');tog.className='thinking-toggle';tog.innerHTML='<span>▸</span> reasoning';
      const tc=document.createElement('div');tc.className='thinking-content';tc.textContent=reasoning;
      tog.addEventListener('click',()=>{const o=tc.classList.toggle('open');tog.querySelector('span').textContent=o?'▾':'▸';});
      block.appendChild(tog);block.appendChild(tc);body.appendChild(block);
    }

    content=content.replace(/\s*\/n\s*/g,'\n');

    const editRe=/(\[EDIT:\s*[^\]]+\][\s\S]*?\[\/EDIT\])/g;
    const rawParts=content.split(editRe);
    const{edits}=parseEditBlocks(content,files);

    let editIdx=0;
    for(const part of rawParts){
      if(/^\[EDIT:/i.test(part)){
        const edit=edits[editIdx++];
        if(edit)await openEditPanelAnimated(edit.name,edit.hunks,edit.isFirst);
      } else if(part.trim()){
        await revealContent(part,body);
      }
    }

    if(edits.length){
      const chipRow=document.createElement('div');chipRow.style.cssText='display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.3rem';
      for(const e of edits)chipRow.appendChild(makeEditChip(e));
      body.appendChild(chipRow);
    }

    // Append sources strip to actions bar if there were any fetches
    if(visitedUrls.length > 0){
      const strip = makeSourcesStrip(visitedUrls);
      if(strip) actions.appendChild(strip);
    }

  } catch(err){
    loading.remove();
    const{body}=createAiMsg();
    body.textContent='something went wrong. try again.';
  }
  sendBtn.disabled=false;
  inputEl.focus();
}

async function send(){
  const promptText=inputEl.value.trim();
  if(!promptText&&!attachedFiles.length)return;
  if(sendBtn.disabled)return;
  if(emptyState){emptyState.remove();emptyState=null;}
  const filesToSend=[...attachedFiles];
  lastPromptText=promptText;lastFilesToSend=filesToSend;
  renderUserMessage(promptText,filesToSend);
  inputEl.value='';inputEl.style.height='auto';
  attachedFiles=[];renderAttachBar();
  sendBtn.disabled=true;
  await doAiRequest(promptText,filesToSend);
}

if(window.location.pathname==='/chat/')window.history.replaceState({},'','/');
